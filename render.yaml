services:
  - type: web
    name: cso-intel-assistant-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /agents
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: MODEL_ID
        value: openai/gpt-4o-mini
      - key: EXA_API_KEY
        sync: false
      - key: DASHBOARD_URL
        sync: false
